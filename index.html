<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🧮 Fun Calculator!</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="calculator" aria-label="Calculator">
    <div class="display" role="region" aria-label="Calculator display">
      <div class="display-watermark" aria-hidden="true">BHAVANI</div>
      <div id="expression" class="expression" aria-label="Expression" aria-live="off"></div>
      <div id="result" class="result" aria-label="Result" aria-live="polite" aria-atomic="true">0</div>
    </div>
    <div class="buttons" role="group" aria-label="Calculator buttons">
      <button class="btn btn-clear" data-action="clear" aria-label="All Clear">AC</button>
      <button class="btn btn-action" data-action="backspace" aria-label="Backspace">⌫</button>
      <button class="btn btn-operator" data-action="operator" data-value="%" aria-label="Modulo">%</button>
      <button class="btn btn-operator" data-action="operator" data-value="/" aria-label="Divide">÷</button>

      <button class="btn btn-number" data-action="number" data-value="7">7</button>
      <button class="btn btn-number" data-action="number" data-value="8">8</button>
      <button class="btn btn-number" data-action="number" data-value="9">9</button>
      <button class="btn btn-operator" data-action="operator" data-value="*" aria-label="Multiply">×</button>

      <button class="btn btn-number" data-action="number" data-value="4">4</button>
      <button class="btn btn-number" data-action="number" data-value="5">5</button>
      <button class="btn btn-number" data-action="number" data-value="6">6</button>
      <button class="btn btn-operator" data-action="operator" data-value="-" aria-label="Subtract">−</button>

      <button class="btn btn-number" data-action="number" data-value="1">1</button>
      <button class="btn btn-number" data-action="number" data-value="2">2</button>
      <button class="btn btn-number" data-action="number" data-value="3">3</button>
      <button class="btn btn-operator" data-action="operator" data-value="+" aria-label="Add">+</button>

      <button class="btn btn-number" data-action="toggle-sign" aria-label="Toggle sign">+/−</button>
      <button class="btn btn-number" data-action="number" data-value="0">0</button>
      <button class="btn btn-number" data-action="decimal" aria-label="Decimal point">.</button>
      <button class="btn btn-equals" data-action="equals" aria-label="Equals">=</button>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
